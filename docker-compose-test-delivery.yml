# Compose di TEST per il delivery-service: avvia un broker Kafka reale e lancia `mvn test` del
# modulo in un container Maven (i fat-jar restano la via di avvio in PRODUZIONE; qui Maven e'
# confinato al solo container di test). Gli integration test Kafka (guardati da assumeBrokerReachable)
# girano perche' broker:9092 e' raggiungibile nella rete.
#   Uso:  docker compose -f docker-compose-test-delivery.yml up --build --abort-on-container-exit
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    networks: [test_network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: broker
    networks: [test_network]
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server broker:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  delivery-service-test:
    image: maven:3.9-eclipse-temurin-25
    working_dir: /project
    networks: [test_network]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - EV_CHANNELS_LOCATION=broker:9092
    volumes:
      - ./delivery-service:/project
      - maven-repo:/root/.m2
    command: ["mvn", "clean", "test"]

networks:
  test_network:
    driver: bridge

volumes:
  maven-repo:
