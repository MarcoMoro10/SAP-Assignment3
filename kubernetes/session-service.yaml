apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-service
  namespace: shipping-on-the-air
  labels:
    app: session-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: session-service
  template:
    metadata:
      labels:
        app: session-service
    spec:
      containers:
        - name: session-service
          image: session-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9001
          env:
            - name: ACCOUNT_HOST
              value: "account-service"
            - name: ACCOUNT_PORT
              value: "9000"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 9001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 9001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: session-service
  namespace: shipping-on-the-air
  labels:
    app: session-service
spec:
  type: ClusterIP
  selector:
    app: session-service
  ports:
    - name: http
      port: 9001
      targetPort: 9001
