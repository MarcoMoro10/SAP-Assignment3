apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: shipping-on-the-air
  labels:
    app: delivery-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      containers:
        - name: delivery-service
          image: delivery-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9002
            - containerPort: 9003
            - containerPort: 9400
          env:
            - name: EV_CHANNELS_LOCATION    # broker Kafka via DNS del Service "broker"
              value: "broker:9092"
            - name: SESSION_HOST
              value: "session-service"
            - name: SESSION_PORT
              value: "9001"
            - name: DELIVERY_EVENTS_FILE    # relative to WORKDIR /project -> /project/data (the PVC mount)
              value: "data/delivery-events.json"
          volumeMounts:
            - name: delivery-data
              mountPath: /project/data
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 9002
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 9002
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 4
      volumes:
        - name: delivery-data
          persistentVolumeClaim:
            claimName: delivery-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: delivery-data
  namespace: shipping-on-the-air
  labels:
    app: delivery-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-service
  namespace: shipping-on-the-air
  labels:
    app: delivery-service
spec:
  type: ClusterIP
  selector:
    app: delivery-service
  ports:
    - name: delivery
      port: 9002
      targetPort: 9002
    - name: admin
      port: 9003
      targetPort: 9003
    - name: metrics
      port: 9400
      targetPort: 9400
