apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: shipping-on-the-air
  labels:
    app: delivery-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      containers:
        - name: delivery-service
          image: delivery-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9002
            - containerPort: 9003
            - containerPort: 9400
          env:
            - name: EV_CHANNELS_LOCATION    # broker Kafka via DNS del Service "broker"
              value: "broker:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-service
  namespace: shipping-on-the-air
  labels:
    app: delivery-service
spec:
  type: ClusterIP
  selector:
    app: delivery-service
  ports:
    - name: delivery
      port: 9002
      targetPort: 9002
    - name: admin
      port: 9003
      targetPort: 9003
    - name: metrics
      port: 9400
      targetPort: 9400
