apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: shipping-on-the-air
  labels:
    app: api-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            - containerPort: 9401
          env:
            - name: ACCOUNT_HOST
              value: "account-service"
            - name: DELIVERY_HOST
              value: "delivery-service"
            - name: EV_CHANNELS_LOCATION     # il gateway e' client Kafka per i comandi di dominio
              value: "broker:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: shipping-on-the-air
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: metrics
      port: 9401
      targetPort: 9401
