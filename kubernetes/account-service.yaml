apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: shipping-on-the-air
  labels:
    app: account-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: account-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: account-data
              mountPath: /project/data
      volumes:
        - name: account-data
          persistentVolumeClaim:
            claimName: account-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: account-data
  namespace: shipping-on-the-air
  labels:
    app: account-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: shipping-on-the-air
  labels:
    app: account-service
spec:
  type: ClusterIP
  selector:
    app: account-service
  ports:
    - name: http
      port: 9000
      targetPort: 9000
